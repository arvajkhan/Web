<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .column{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            
        }
        div{
            background-color: blueviolet;
            
        }
    </style>
</head>
<body>

    <div class="column">
        <div class="div">1</div>
        <div class="div">2</div>
        <div class="div">3</div>
    </div>
</body>
</html>
