<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .columns{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .div{
            background-color: red;
            height: 100px;
        }
    </style>
</head>
<body>
    <div class="columns">
        <div class="div">1</div>
        <div class="div">2</div>
        <div class="div">3</div>
    </div>
</body>
</html>
