<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .navbar{
            display: flex;
            justify-content: space-between;
            background-color: #1e293b;
            color: white;
        }
        .navlink{
            display: flex;
        }
        .logo{
            margin-top: 5px;
        }
        span{
            font-size: 30px;
            
        }
        li{
            list-style: none;
            padding: 10px;

            
        }
        a{
            text-decoration: none;
            font-size: 25px;
            color: white;
            font-weight: 500;
        }

        @media(max-width: 768px){
            .navbar{
                display: flex;
                place-content: center;
                align-items: center;
                flex-direction: column;
            }
            li{
                padding: 5px;
            }
            a{
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <span>MyWebsite</span>
        </div>
        <div class="navlink">
            <li><a href="">Home</a></li>
            <li><a href="">About</a></li>
            <li><a href="">Contact</a></li>
            <li><a href="">Menu</a></li>
        </div>
    </nav>
</body>
</html>
