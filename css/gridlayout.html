<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .grid{
            border: 3px solid black;
            border-radius: 10px;
            display: grid;
            grid-template-rows: repeat(2,150px);
            grid-template-columns: repeat(3,1fr);
            gap: 20px;

        }
        .divone{background-color: red; 
            grid-area: 1/1/3/3;
            grid-column-start: 1; grid-column-end: 4;}
        .divtwo{background-color: yellow; grid-column-start: 1; grid-column-end: 3;}
        .divthree{background-color: green;}
        .divfour{background-color: brown;}
        .divfive{background-color: cadetblue;
        
        }
        .divsixes{background-color: blueviolet;}

    </style>
</head>
<body>
        <div class="grid">
            <div class="div divone">1</div>
            <div class="div divtwo">2</div>
            <div class="div divthree">3</div>
            <div class="div divfour">4</div>
            <div class="div divfive">5</div>
            <div class="div divsixes">6</div>
        </div>
</body>
</html>
