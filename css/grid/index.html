<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        main{
            width: 90%;
            margin: 50px auto;
            border: 2px solid black;
            display: grid;
            place-content: center;
            align-items: center;
            /* grid-template-rows: 100px 150px;
            grid-template-columns: 1fr 2fr 1fr; */
             grid-template-columns: repeat(3, 1fr);
             grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
             

             /* gap */
             /* grid-row-gap: 20px;
             grid-column-gap: 40px; */
            gap: 20px;
            
        }
        div{
            color: black;
            /* width: 230px; */
           height: 100px; 
           box-shadow: 0.1px 0.1px 4px 0.2px black;
           border-radius: 10px;
           display: grid;
           align-items: center;
           place-content: center;
        }
        .div1{background-color: red;}
        .div2{background-color: yellow;}
        .div3{background-color: blueviolet;}
        .div4{background-color: brown; color: white;}
        .div5{background-color: cadetblue;}
        .div6{background-color: chartreuse;}
        .div7{background-color: chocolate;}
        .div8{background-color: cornflowerblue;}
    </style>
</head>
<body>
    <main>
        <div class="div1">Div1</div>
        <div class="div2">Div2</div>
        <div class="div3">Div3</div>
        <div class="div4">Div4</div>
        <div class="div5">Div5</div>
        <div class="div6">Div6</div>
        <div class="div7">Div7</div>
        <div class="div8">Div8</div>
    </main>
</body>
</html>
