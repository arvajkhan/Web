<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Chessboard</title>
<link rel="stylesheet" href="">
<style>
  /* === Base styling === */
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #eee;
    font-family: sans-serif;
  }

  /* === Chessboard container === */
  .chessboard {
    display: grid;
    grid-template-columns: repeat(8, 60px); /* 8x8 board */
    grid-template-rows: repeat(8, 60px);
    border: 4px solid #000;
  }

  /* === Each cell === */
  .cell {
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    font-size: 20px;
    border: 1px solid #333;
  }

  /* === Alternate black/white pattern === */
  .cell:nth-child(odd) {
    background-color: black;
    color: white;
  }

  .cell:nth-child(even) {
    background-color: white;
    color: black;
  }

  /* Adjust alternating pattern every row (pure CSS trick) */
  .row:nth-child(even) .cell:nth-child(odd) {
    background-color: white;
    color: black;
  }
  .row:nth-child(even) .cell:nth-child(even) {
    background-color: black;
    color: white;
  }
</style>
</head>
<body>

<!-- === 8x8 Chessboard using only HTML === -->
<div class="chessboard">
  <!-- You can change the number of rows & cells for N×N -->
  <!-- Each row -->
  <div class="row">
    <div class="cell">B</div><div class="cell">W</div><div class="cell">B</div><div class="cell">W</div>
    <div class="cell">B</div><div class="cell">W</div><div class="cell">B</div><div class="cell">W</div>
  </div>
  <div class="row">
    <div class="cell">W</div><div class="cell">B</div><div class="cell">W</div><div class="cell">B</div>
    <div class="cell">W</div><div class="cell">B</div><div class="cell">W</div><div class="cell">B</div>
  </div>
  <div class="row">
    <div class="cell">B</div><div class="cell">W</div><div class="cell">B</div><div class="cell">W</div>
    <div class="cell">B</div><div class="cell">W</div><div class="cell">B</div><div class="cell">W</div>
  </div>
  <div class="row">
    <div class="cell">W</div><div class="cell">B</div><div class="cell">W</div><div class="cell">B</div>
    <div class="cell">W</div><div class="cell">B</div><div class="cell">W</div><div class="cell">B</div>
  </div>
  <div class="row">
    <div class="cell">B</div><div class="cell">W</div><div class="cell">B</div><div class="cell">W</div>
    <div class="cell">B</div><div class="cell">W</div><div class="cell">B</div><div class="cell">W</div>
  </div>
  <div class="row">
    <div class="cell">W</div><div class="cell">B</div><div class="cell">W</div><div class="cell">B</div>
    <div class="cell">W</div><div class="cell">B</div><div class="cell">W</div><div class="cell">B</div>
  </div>
  <div class="row">
    <div class="cell">B</div><div class="cell">W</div><div class="cell">B</div><div class="cell">W</div>
    <div class="cell">B</div><div class="cell">W</div><div class="cell">B</div><div class="cell">W</div>
  </div>
  <div class="row">
    <div class="cell">W</div><div class="cell">B</div><div class="cell">W</div><div class="cell">B</div>
    <div class="cell">W</div><div class="cell">B</div><div class="cell">W</div><div class="cell">B</div>
  </div>
</div>

</body>
</html>
