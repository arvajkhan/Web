<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>String : Concat</h1>
  <h2 class="show"></h2>
  <p class="result"></p>
  <script>
    let show = document.querySelector(".show")
    let result = document.querySelector(".result")
    let str = "My Name is Shahil Khan"
    let str1 = " From Kasganj"

    show.innerHTML = str
    result.innerHTML = str.concat(str1)
  </script>
</body>
</html>
