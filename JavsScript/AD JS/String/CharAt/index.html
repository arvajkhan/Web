<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>String charAt() Method</h1>
    <p>Return The Character of at Index</p>
    <h2 class="str"></h2>
    <h3 class="result"></h3>
    <script>
      let str = "My Name is Shahil";
      let show = document.querySelector(".str");
      show.innerHTML = str;
      let result = document.querySelector(".result");
      result.innerHTML = str.charAt("0");
    </script>
  </body>
</html>
