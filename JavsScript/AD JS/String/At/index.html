<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1> String At Method</h1>
  <h2 class="str"></h2>
  <h3 class="result"></h3>
  <script>
    let str = "My Name is Arvaj khan"
    let show = document.querySelector(".str")
    show.innerHTML = str
    let result = document.querySelector(".result")
    result.innerHTML = str.at("-4")
  </script>
</body>
</html>
