<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- Slice: Slice is use extract part of Sting -->
    <h2>Slice Method</h2>
    <h3 class="ShowTheSting"></h3>
    <h4 class="result"></h4>
    <script>
      let ShowTheSting = document.querySelector(".ShowTheSting");
      let result = document.querySelector(".result")
      let name = " My Name is Arvaj khan ";
      ShowTheSting.innerHTML = name;
      let output = name.slice(0, 17);
      result.innerHTML = output
    </script>
  </body>
