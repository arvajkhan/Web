<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Names</title>
</head>
<body>
  <h3 class="dd"></h3>
    <input type="text" id="searchBox" placeholder="Enter name...">
    <button onclick="searchName()">Search</button>
    <h1 id="result"></h1>

    <script>
        const nameList = ["rahul", "amit", "priya", "sneha", "rohit"];
        let aa = document.querySelector(".dd")
        aa.innerHTML = ` ${nameList} `
        function searchName() {
            let query = document.getElementById("searchBox").value.toLowerCase().trim();
            let resultTag = document.getElementById("result");

            if (query === "") {
                resultTag.innerHTML = "Please enter a name.";
                return;
            }

            if (nameList.includes(query)) {
                resultTag.innerHTML = `${query}`;
                resultTag.style.color = "green";
            } else {
                resultTag.innerHTML = "Result is not found";
                resultTag.style.color = "red";
            }
        }
    </script>
</body>
</html>
