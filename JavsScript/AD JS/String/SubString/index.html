<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>String : Substring</h1>
    <h2 class="show"></h2>
    <p class="result"></p>
    <script>
      let show = document.querySelector(".show");
      let result = document.querySelector(".result");
      let str = "This is good for you";

      show.innerHTML = str;
      result.innerHTML = str.substring(0, 4);
      result.innerHTML = str.substring(5, 7);
      result.innerHTML = str.substring(8, 12);
      result.innerHTML = str.substring(13, );
    </script>
  </body>
</html>
