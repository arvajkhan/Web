<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
      .card {
        box-shadow: 1px 1px 5px 1px black;
      }
    </style>
  </head>
  <body>
    <button onclick="loadData()" class="btn btn-primary">Load Data...</button>
    <div class="result row"></div>

    <script>
      let allProducts=[];

      function loadData() {
        fetch("https://dummyjson.com/carts")
          .then((response) => response.json())
          .then((data) => {
            let output = " ";
            data.carts.forEach((card) => {
              card.products.forEach((product) => {
                output += `
            <div class="col-md-3">
              <div class="card p-3 mt-3">
              <img src="${product.thumbnail}" height="200px" >
              <h5> Id ${product.id} </h5>
              <p> Title: ${product.title} </p>
              <p> Price: ${product.price} </p>
              <p> Quantity:  ${product.quantity} </p>
              <p> DisCount Percentage ${product.discountPercentage} </p>
              <p> Discount Total ${product.discountedTotal} </p>
              </div>
            </div>  
            `;
              });
            });

            document.querySelector(".result").innerHTML = output;
          })
          .catch((error) => console.log(error));
      }
    </script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
