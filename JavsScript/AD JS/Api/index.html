<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <button onclick="loadData()" class="btn btn-primary">Load Data</button>
    <input
      type="text"
      placeholder="Search Product..."
      class="form-control mt-3"
      id="searchInput"
      onkeyup="searchData()"
    />
    <div class="result row mt-3"></div>

    <script>
      let allProduct = [];
      function loadData() {
        fetch("https://dummyjson.com/carts")
          .then((response) => response.json())
          .then((data) => {
            allProduct = [];
            data.carts.forEach((card) => {
              card.products.forEach((product) => {
                allProduct.push(product);
              });
            });
            displayData(allProduct);
          });
      }

      function displayData(products) {
        let output = " ";
        products.forEach((product) => {
          output += `
           <div class="col-md-2">
            <div class="card p-3 mt-3">
              <img src="${product.thumbnail}" height="200" class="img-fluid">
              <h5>${product.title}</h5>
              <p>Price: ${product.price}</p>
              <p>Quantity: ${product.quantity}</p>
            </div>
          </div>      
        `;
        });
        document.querySelector(".result").innerHTML = output;
      }

      function searchData() {
        let searchText = document.getElementById("searchInput").value.toLowerCase();
        let filteredData = allProduct.filter((product) =>
          product.title.toLowerCase().includes(searchText),
        );

        displayData(filteredData);
      }
    </script>
  </body>
</html>
