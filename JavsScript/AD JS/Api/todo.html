<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="container mt-4">
    <h2 class="mb-3">Todo App</h2>

    <div class="d-flex gap-2">
      <input
        type="text"
        id="todoInput"
        class="form-control"
        placeholder="Enter Todo"
      />

      <button onclick="addTodo()" class="btn btn-success">Add</button>
    </div>

    <input
      type="text"
      class="form-control mt-3"
      placeholder="Search Todo..."
      onkeyup="searchTodo()"
      id="searchInput"
    />

    <button onclick="loadData()" class="btn btn-primary mt-3">
      Load Todos
    </button>

    <div id="result" class="mt-4"></div>

    <script>
      let allTodos = [];

      function loadData() {
        fetch("https://dummyjson.com/todos")
          .then((res) => res.json())

          .then((data) => {
            allTodos = data.todos;

            displayData(allTodos);
          });
      }

      function displayData(data) {
        let output = "";

        data.forEach((todo) => {
          output += `

<div class="card p-3 mt-3">

<h5>${todo.todo}</h5>

<p>Status:
${todo.completed ? "✅ Completed" : "❌ Pending"}
</p>

<button
class="btn btn-warning"
onclick="updateTodo(${todo.id})"
>
Update
</button>

<button
class="btn btn-danger mt-2"
onclick="deleteTodo(${todo.id})"
>
Delete
</button>

</div>

`;
        });

        document.getElementById("result").innerHTML = output;
      }

      function searchTodo() {
        let text = document.getElementById("searchInput").value.toLowerCase();

        let filtered = allTodos.filter((item) =>
          item.todo.toLowerCase().includes(text),
        );

        displayData(filtered);
      }

      function addTodo() {
        let value = document.getElementById("todoInput").value;

        if (value === "") {
          alert("Enter todo");

          return;
        }

        fetch("https://dummyjson.com/todos/add", {
          method: "POST",

          headers: {
            "Content-Type": "application/json",
          },

          body: JSON.stringify({
            todo: value,
            completed: false,
            userId: 1,
          }),
        })
          .then((res) => res.json())

          .then((data) => {
            allTodos.unshift(data);

            displayData(allTodos);

            document.getElementById("todoInput").value = "";
          });
      }

      function deleteTodo(id) {
        fetch(`https://dummyjson.com/todos/${id}`, {
          method: "DELETE",
        })
          .then((res) => res.json())

          .then(() => {
            allTodos = allTodos.filter((item) => item.id !== id);

            displayData(allTodos);
          });
      }

      function updateTodo(id) {
        fetch(`https://dummyjson.com/todos/${id}`, {
          method: "PUT",

          headers: {
            "Content-Type": "application/json",
          },

          body: JSON.stringify({
            completed: true,
          }),
        })
          .then((res) => res.json())

          .then((data) => {
            allTodos = allTodos.map((item) => {
              if (item.id === id) {
                item.completed = true;
              }

              return item;
            });

            displayData(allTodos);
          });
      }
    </script>
  </body>
</html>
