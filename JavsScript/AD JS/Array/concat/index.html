<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body {
      display: grid;
      align-items: center;
      place-items: center;
    }

    .form {
      width: 400px;
      height: 400px;
      border: 2px solid black;
      border-radius: 10px;
      display: grid;
      align-items: center;
      place-items: center;
    }

    input {
      height: 30px;
      width: 95%;
      border-radius: 10px;
    }

    button {
      height: 33px;
      width: 96%;
      border-radius: 10px;
    }

    h2 {
      margin-bottom: px;
    }

    label {
      font-size: 25px;
      text-align: left;
    }
  </style>
</head>

<body>
  <div class="form">
    <h1>Concat Array Values</h1>
    <h2 class="show"></h2>
    <label for="">Enter Value of Array</label>
    <input type="text" name="" id="value">
    <button onclick="btn()">Add</button>
    <p class="result"></p>
  </div>
  <script>
    let show = document.querySelector(".show")
    let arr = [1, 2, 3, 4, 5, 6, 7]
    show.innerHTML = "Array : " + arr.join(" ")
    function btn(){
      let addNewArray = document.querySelector("#value").value
      let result = document.querySelector(".result")
      let finalArray = arr.concat(addNewArray)
      result.innerHTML = "Final Array : " + finalArray.join(" ")
    }
  </script>
</body>

</html>
